<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DS刷题">
  <meta name="description" content="数据结构期末考试题库">
  <title>数据结构刷题</title>
  <style>
    /* ====== 全局 CSS 变量和基础样式 ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1a2744;
      --accent: #0f3460;
      --accent-light: #1a508b;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0b0;
      --correct: #00b894;
      --error: #e94560;
      --warning: #fdcb6e;
      --progress: #6c5ce7;
      --surface: #0d1b36;
      --radius: 12px;
      --radius-sm: 8px;
      --font-mono: 'Courier New', monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ====== 页面切换动画 ====== */
    .page {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .page.active { display: flex; opacity: 1; transform: translateY(0); }
    .page.exit { opacity: 0; transform: translateY(-20px); }

    /* ====== 封面页 ====== */
    .cover-container {
      text-align: center; padding: 2rem;
      max-width: 400px; width: 100%;
    }

    .cover-title {
      font-size: 1.75rem; font-weight: 700;
      letter-spacing: 0.25em; margin: 1.5rem 0 0.5rem;
      color: var(--text-primary);
    }

    .cover-subtitle {
      font-size: 0.875rem; color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .cover-stats {
      display: flex; justify-content: center; align-items: center;
      gap: 0; background: var(--bg-card);
      border-radius: var(--radius); padding: 1rem 1.5rem;
      margin-bottom: 2.5rem;
    }

    .stat-item { display: flex; flex-direction: column; align-items: center; padding: 0 1rem; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent-light); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .stat-divider { width: 1px; height: 40px; background: var(--accent); opacity: 0.3; }

    .btn-primary {
      display: block; width: 100%; max-width: 300px; margin: 0 auto;
      padding: 1rem 2rem; font-size: 1.125rem; font-weight: 600;
      color: #fff; background: var(--accent-light);
      border: none; border-radius: var(--radius);
      cursor: pointer; letter-spacing: 0.15em;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(26,80,139,0.4); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(26,80,139,0.5); }
      50% { box-shadow: 0 0 0 12px rgba(26,80,139,0); }
    }

    .last-progress {
      margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary);
    }
    .last-progress.hidden { display: none; }
    .btn-text {
      background: none; border: none; color: var(--accent-light);
      font-size: 0.85rem; cursor: pointer; padding: 0.25rem 0.5rem;
    }

    /* ====== 答题页 ====== */
    #quiz.page.active {
      display: flex; flex-direction: column; align-items: stretch;
      justify-content: flex-start;
    }

    .toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
      min-height: 52px;
    }

    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 1.25rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
    .btn-icon:active { background: rgba(255,255,255,0.12); }

    .toolbar-title {
      font-size: 1rem; font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toolbar-controls {
      display: flex; gap: 0.35rem; flex: 1;
      justify-content: center; align-items: center;
      flex-wrap: wrap;
    }

    .sel {
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      font-family: inherit;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      cursor: pointer;
      min-width: 60px;
      outline: none;
      transition: border-color 0.15s;
    }
    .sel:focus { border-color: var(--accent-light); }

    .quiz-main {
      flex: 1; width: 100%; max-width: 700px;
      margin: 60px auto 60px; padding: 1rem;
      overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .quiz-main::-webkit-scrollbar { width: 6px; }
    .quiz-main::-webkit-scrollbar-track { background: transparent; }
    .quiz-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    /* ====== 题目卡片 ====== */
    .question-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.25rem;
      animation: cardSlideIn 0.3s ease-out;
      border: 1px solid rgba(255,255,255,0.06);
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .chapter-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--text-primary);
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      letter-spacing: 0.05em;
    }

    .question-number {
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex: 1;
      text-align: center;
    }

    .type-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(108,92,231,0.2);
      color: var(--progress);
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
    }

    .question-text {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      font-weight: 500;
      word-break: break-word;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      line-height: 1.5;
    }
    .option-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
    }
    .option-btn:active {
      transform: scale(0.98);
    }

    .option-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .option-text {
      flex: 1;
      word-break: break-word;
    }

    .option-btn.selected {
      border-color: var(--accent-light);
      background: rgba(26,80,139,0.2);
    }
    .option-btn.selected .option-letter {
      background: var(--accent-light);
    }

    .option-btn.correct {
      border-color: var(--correct) !important;
      background: rgba(0,184,148,0.12) !important;
    }
    .option-btn.correct .option-letter {
      background: var(--correct);
    }

    .option-btn.incorrect {
      border-color: var(--error) !important;
      background: rgba(233,69,96,0.12) !important;
    }
    .option-btn.incorrect .option-letter {
      background: var(--error);
    }

    .option-btn:disabled {
      cursor: default;
      opacity: 0.55;
    }
    .option-btn:disabled:hover {
      background: var(--surface);
      border-color: rgba(255,255,255,0.08);
    }

    /* ====== 填空题 ====== */
    .fill-area {
      display: flex; gap: 0.75rem; margin-bottom: 1rem;
    }

    .fill-input {
      flex: 1; padding: 0.75rem 1rem;
      font-size: 1rem; font-family: var(--font-mono);
      background: var(--surface);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .fill-input:focus {
      border-color: var(--accent-light);
    }
    .fill-input:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .btn-submit {
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem; font-weight: 600;
      color: #fff; background: var(--accent-light);
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #1a6db8; }
    .btn-submit:disabled {
      opacity: 0.55;
      cursor: default;
    }

    /* ====== 反馈信息 ====== */
    .feedback {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
    }
    .feedback.hidden { display: none; }
    .feedback-correct {
      background: rgba(0,184,148,0.1);
      color: var(--correct);
      border: 1px solid rgba(0,184,148,0.2);
    }
    .feedback-incorrect {
      background: rgba(233,69,96,0.1);
      color: var(--error);
      border: 1px solid rgba(233,69,96,0.2);
    }

    .explanation {
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .explanation.hidden { display: none; }

    .next-btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--accent-light);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, transform 0.1s;
    }
    .next-btn:hover { background: #1e5fa0; }
    .next-btn:active { transform: scale(0.97); }
    .next-btn.hidden { display: none; }

    .fill-placeholder {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .quiz-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0.5rem 1rem; z-index: 100;
    }

    .progress-bar {
      width: 100%; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: var(--progress);
      border-radius: 2px;
      transition: width 0.35s ease-out;
    }

    .progress-stats {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.35rem; font-size: 0.75rem; color: var(--text-secondary);
    }

    .correct-rate { color: var(--correct); }

    /* ====== 结算页 ====== */
    .result-container {
      max-width: 500px; width: 100%; padding: 2rem 1.5rem;
      text-align: center; overflow-y: auto; max-height: 100vh;
    }
    .result-title { font-size: 1.5rem; margin-bottom: 1.5rem; }

    .result-ring { margin: 0 auto 1.5rem; }

    .chapter-scores {
      display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;
      text-align: left;
    }
    .chapter-score-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem; background: var(--bg-card);
      border-radius: var(--radius-sm);
    }
    .chapter-score-name { width: 5em; font-size: 0.8rem; color: var(--text-secondary); }
    .chapter-score-bar {
      flex: 1; height: 6px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .chapter-score-fill {
      height: 100%; background: var(--correct); border-radius: 3px;
      transition: width 0.8s ease-out;
    }
    .chapter-score-pct { width: 3em; font-size: 0.8rem; color: var(--text-primary); text-align: right; }

    .wrong-review {
      text-align: left; margin-bottom: 1.5rem;
    }
    .wrong-title {
      font-size: 0.95rem; font-weight: 600; color: var(--error);
      margin-bottom: 0.75rem;
    }
    .wrong-item {
      background: var(--bg-card); border-radius: var(--radius-sm);
      padding: 0.75rem 1rem; margin-bottom: 0.5rem;
      border-left: 3px solid var(--error);
    }
    .wrong-item .question-text { font-size: 0.85rem; margin-bottom: 0.5rem; }
    .wrong-item .wrong-detail { font-size: 0.8rem; color: var(--text-secondary); }
    .wrong-item .wrong-detail span { color: var(--error); }
    .wrong-item .wrong-detail .correct-ans { color: var(--correct); }

    .result-actions {
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .btn-secondary {
      display: block; width: 100%; padding: 0.75rem 1.5rem;
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-secondary); background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--bg-card-hover); }

    /* ====== Task 6: 卡片动画 ====== */
    .question-card.card-correct {
      animation: correctGlow 0.5s ease-in-out;
    }
    @keyframes correctGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,184,148,0); }
      50% { box-shadow: 0 0 20px 4px rgba(0,184,148,0.3); }
    }

    .question-card.card-wrong {
      animation: shakeX 0.4s ease;
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ====== Task 6: 选项禁用和高亮 ====== */
    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.7;
    }

    .option-btn.wrong {
      border-color: var(--error) !important;
      background: rgba(233,69,96,0.12) !important;
    }
    .option-btn.wrong .option-letter {
      background: var(--error);
    }

    /* ====== Task 6: 反馈横幅 ====== */
    .feedback-banner {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1rem; border-radius: var(--radius-sm);
      margin-bottom: 1rem; font-size: 0.95rem;
    }
    .feedback-banner.feedback-correct { background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3); color: var(--correct); }
    .feedback-banner.feedback-wrong { background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3); color: var(--error); }
    .feedback-icon { font-size: 1.25rem; flex-shrink: 0; }
    .feedback-text { font-weight: 600; }
    .feedback-answer { margin-left: auto; color: var(--text-secondary); font-size: 0.85rem; }

    /* ====== Task 6: 解析区 ====== */
    .explanation-box {
      background: var(--surface); border-radius: var(--radius-sm);
      padding: 1rem; margin-bottom: 1rem;
      animation: expandIn 0.3s ease-out;
      overflow: hidden;
    }
    @keyframes expandIn {
      from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
      to { opacity: 1; max-height: 500px; }
    }
    .explanation-header {
      font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .explanation-content {
      font-size: 0.9rem; line-height: 1.65; color: var(--text-secondary);
    }

    /* ====== Task 6: 下一题按钮 ====== */
    .btn-next {
      display: block; width: 100%;
      padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600;
      color: #fff; background: var(--accent-light);
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; text-align: center;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-next:hover { background: #1a6db8; transform: scale(1.01); }
    .btn-next:active { transform: scale(0.98); }

    /* ====== Task 7: 标记按钮 ====== */
    .btn-mark {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.3rem 0.65rem;
      font-size: 0.8rem; font-weight: 500;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-mark:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.25); }
    .btn-mark.marked {
      background: rgba(253,203,110,0.12);
      border-color: rgba(253,203,110,0.35);
      color: var(--warning);
    }

    /* ====== Task 7: 考试状态栏 ====== */
    .exam-status {
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      padding: 0.45rem 0.75rem; margin-top: 0.4rem;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      font-size: 0.78rem; color: var(--text-secondary);
    }
    .exam-status.hidden { display: none; }
    .exam-status strong { color: var(--text-primary); font-weight: 600; }

    .btn-submit-exam {
      margin-left: 0.5rem;
      padding: 0.35rem 1rem;
      font-size: 0.8rem; font-weight: 600;
      color: #fff; background: var(--error);
      border: none; border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-submit-exam:hover { background: #d63851; }
    .btn-submit-exam:active { transform: scale(0.96); }

    /* ====== 响应式 ====== */
    @media (max-width: 768px) {
      .cover-title { font-size: 1.5rem; letter-spacing: 0.2em; }
      .cover-stats { padding: 0.75rem 1rem; }
      .stat-item { padding: 0 0.6rem; }
      .stat-num { font-size: 1.25rem; }

      .toolbar-title { display: none; }
      .toolbar { padding: 0.4rem 0.6rem; gap: 0.35rem; }
      .btn-icon { width: 36px; height: 36px; font-size: 1.1rem; }
      .sel { font-size: 0.75rem; padding: 0.35rem 0.45rem; }
      .quiz-main { margin: 54px auto 54px; padding: 0.75rem; }
    }

    @media (max-width: 480px) {
      .cover-container { padding: 1rem; }
      .cover-title { font-size: 1.3rem; letter-spacing: 0.15em; }
      .cover-stats { flex-wrap: wrap; gap: 0.25rem; padding: 0.75rem 0.5rem; }
      .stat-item { padding: 0 0.4rem; }
      .stat-num { font-size: 1.1rem; }
      .stat-label { font-size: 0.65rem; }
      .btn-primary { font-size: 1rem; padding: 0.85rem 1.5rem; }

      .toolbar { padding: 0.35rem 0.5rem; min-height: 46px; }
      .toolbar-controls { gap: 0.25rem; }
      .btn-icon { width: 32px; height: 32px; font-size: 1rem; }
      .sel { font-size: 0.7rem; padding: 0.3rem 0.35rem; min-width: 50px; }
      .quiz-main { margin: 50px auto 50px; padding: 0.5rem; gap: 0.75rem; }
      .quiz-footer { padding: 0.35rem 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- ====== 封面页 ====== -->
  <section id="cover" class="page active">
    <div class="cover-container">
      <canvas id="treeIcon" width="120" height="140"></canvas>
      <h1 class="cover-title">数 据 结 构 刷 题</h1>
      <p class="cover-subtitle">数据结构期末考试题库</p>
      <div class="cover-stats">
        <div class="stat-item">
          <span class="stat-num">9</span>
          <span class="stat-label">章节</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">185</span>
          <span class="stat-label">选择题</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">326</span>
          <span class="stat-label">填空题</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">511</span>
          <span class="stat-label">总题数</span>
        </div>
      </div>
      <button id="btnStart" class="btn-primary btn-pulse">开 始 刷 题</button>
      <div id="lastProgress" class="last-progress hidden">
        <span id="lastProgressText"></span>
        <button id="btnContinue" class="btn-text">继续上次 ▸</button>
      </div>
    </div>
  </section>

  <!-- ====== 答题页 ====== -->
  <section id="quiz" class="page">
    <header class="toolbar" id="quizToolbar">
      <button id="btnBack" class="btn-icon" title="返回封面">&#x2190;</button>
      <span class="toolbar-title">数据结构刷题</span>
      <div class="toolbar-controls">
        <select id="selChapter" class="sel">
          <option value="0">全部章节</option>
          <option value="1">第1章 绪论</option>
          <option value="2">第2章 线性表</option>
          <option value="3">第3章 栈和队列</option>
          <option value="4">第4章 串</option>
          <option value="5">第5章 数组和广义表</option>
          <option value="6">第6章 树和二叉树</option>
          <option value="7">第7章 图</option>
          <option value="8">第8章 查找</option>
          <option value="9">第9章 排序</option>
        </select>
        <select id="selMode" class="sel">
          <option value="learn">学习模式</option>
          <option value="exam">考试模式</option>
        </select>
        <select id="selCount" class="sel">
          <option value="0">全部题目</option>
          <option value="10">10题</option>
          <option value="20">20题</option>
          <option value="30">30题</option>
          <option value="50">50题</option>
        </select>
      </div>
    </header>
    <main class="quiz-main" id="quizMain">
      <!-- Task 4 填充题目内容 -->
    </main>
    <footer class="quiz-footer" id="quizFooter">
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-stats">
        <span id="progressText">0 / 0</span>
        <span class="correct-rate" id="correctRate">正确率 --</span>
      </div>
      <div class="exam-status hidden" id="examStatus">
        <span>已答：<strong id="examAnswered">0</strong></span>
        <span>未答：<strong id="examUnanswered">0</strong></span>
        <span>已标记：<strong id="examMarked">0</strong></span>
        <button class="btn-submit-exam" id="btnSubmitExam">交卷</button>
      </div>
    </footer>
  </section>

  <!-- ====== 结算页 ====== -->
  <section id="result" class="page">
    <div class="result-container">
      <h2 class="result-title">刷题完成！ 🎉</h2>

      <div class="result-ring" id="resultRing">
        <svg viewBox="0 0 160 160" width="160" height="160">
          <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12"/>
          <circle cx="80" cy="80" r="70" fill="none" stroke="var(--correct)" stroke-width="12"
                  stroke-linecap="round" stroke-dasharray="440" id="ringProgress"
                  transform="rotate(-90 80 80)"/>
          <text x="80" y="72" text-anchor="middle" fill="#eaeaea" font-size="28" font-weight="700" id="ringPercent">0%</text>
          <text x="80" y="94" text-anchor="middle" fill="#a0a0b0" font-size="12">正确率</text>
        </svg>
      </div>

      <div class="chapter-scores" id="chapterScores"></div>

      <div class="wrong-review" id="wrongReview"></div>

      <div class="result-actions">
        <button class="btn-primary" id="btnRetryWrong">重刷错题</button>
        <button class="btn-secondary" id="btnRestart">重新开始</button>
      </div>
    </div>
  </section>

  <script>
    /* ====== 二叉树封面图标 Canvas 绘制 ====== */
    function drawTreeIcon() {
      const canvas = document.getElementById('treeIcon');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cw = canvas.width, ch = canvas.height;
      const cx = cw / 2, cy = 30;

      ctx.clearRect(0, 0, cw, ch);

      // 节点参数
      const nodeRadius = 14;
      const nodeColor = '#1a508b';
      const nodeStroke = '#6c5ce7';
      const lineColor = '#a0a0b0';
      const textColor = '#eaeaea';

      function drawNode(x, y, letter) {
        ctx.beginPath();
        ctx.arc(x, y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = nodeColor;
        ctx.fill();
        ctx.strokeStyle = nodeStroke;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = textColor;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(letter, x, y);
      }

      function drawLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1 + nodeRadius);
        ctx.lineTo(x2, y2 - nodeRadius);
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 三层二叉树
      const level2y = cy + 40, level3y = cy + 80;
      drawNode(cx, cy, 'A');                         // 根
      drawLine(cx, cy, cx - 30, level2y);            // 连线
      drawLine(cx, cy, cx + 30, level2y);
      drawNode(cx - 30, level2y, 'B');               // 左子
      drawNode(cx + 30, level2y, 'C');               // 右子
      drawLine(cx - 30, level2y, cx - 50, level3y);  // 连线
      drawLine(cx - 30, level2y, cx - 10, level3y);
      drawLine(cx + 30, level2y, cx + 10, level3y);
      drawLine(cx + 30, level2y, cx + 50, level3y);
      drawNode(cx - 50, level3y, 'D');
      drawNode(cx - 10, level3y, 'E');
      drawNode(cx + 10, level3y, 'F');
      drawNode(cx + 50, level3y, 'G');
    }

    /* ====== PWA 图标生成 ====== */
    function generateAppIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 背景：深蓝渐变圆角矩形
      const bgGrad = ctx.createLinearGradient(0, 0, size, size);
      bgGrad.addColorStop(0, '#1a1a2e');
      bgGrad.addColorStop(1, '#0f3460');
      ctx.fillStyle = bgGrad;
      ctx.beginPath();
      const r = size * 0.2;
      ctx.roundRect(0, 0, size, size, r);
      ctx.fill();

      // 绘制简化的二叉树白色图标
      const cx = size / 2, cy = size * 0.25;
      const nodeR = size * 0.08;
      const level2y = cy + size * 0.22;
      const level3y = cy + size * 0.44;

      function pNode(x, y) {
        ctx.beginPath();
        ctx.arc(x, y, nodeR, 0, Math.PI * 2);
        ctx.fillStyle = '#6c5ce7';
        ctx.fill();
        ctx.strokeStyle = '#eaeaea';
        ctx.lineWidth = Math.max(1, size * 0.005);
        ctx.stroke();
      }
      function pLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1 + nodeR);
        ctx.lineTo(x2, y2 - nodeR);
        ctx.strokeStyle = '#a0a0b0';
        ctx.lineWidth = Math.max(1, size * 0.004);
        ctx.stroke();
      }

      pNode(cx, cy);
      pLine(cx, cy, cx - size * 0.15, level2y);
      pLine(cx, cy, cx + size * 0.15, level2y);
      pNode(cx - size * 0.15, level2y);
      pNode(cx + size * 0.15, level2y);
      pLine(cx - size * 0.15, level2y, cx - size * 0.28, level3y);
      pLine(cx - size * 0.15, level2y, cx - size * 0.05, level3y);
      pLine(cx + size * 0.15, level2y, cx + size * 0.05, level3y);
      pLine(cx + size * 0.15, level2y, cx + size * 0.28, level3y);
      pNode(cx - size * 0.28, level3y);
      pNode(cx - size * 0.05, level3y);
      pNode(cx + size * 0.05, level3y);
      pNode(cx + size * 0.28, level3y);

      return canvas.toDataURL('image/png');
    }

    // 生成各尺寸图标
    const icon72 = generateAppIcon(72);
    const icon192 = generateAppIcon(192);
    const icon512 = generateAppIcon(512);

    /* ====== 设置页面图标和 iOS 适配 ====== */
    function setupIcons() {
      const icon512data = generateAppIcon(512);
      const icon192data = generateAppIcon(192);

      // Favicon
      const favicon = document.createElement('link');
      favicon.rel = 'icon';
      favicon.type = 'image/png';
      favicon.href = icon192data;
      document.head.appendChild(favicon);

      // Apple Touch Icon
      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = icon192data;
      document.head.appendChild(appleIcon);
    }

    /* ====== 内联 PWA Manifest（data URI，持久有效） ====== */
    function setupManifest() {
      const icon72 = generateAppIcon(72);
      const icon192 = generateAppIcon(192);
      const icon512 = generateAppIcon(512);

      const manifest = {
        name: '数据结构刷题',
        short_name: 'DS刷题',
        description: '数据结构期末考试题库刷题神器',
        start_url: '.',
        display: 'standalone',
        background_color: '#1a1a2e',
        theme_color: '#1a1a2e',
        orientation: 'any',
        icons: [
          { src: icon72,  sizes: '72x72',   type: 'image/png' },
          { src: icon192, sizes: '192x192', type: 'image/png' },
          { src: icon512, sizes: '512x512', type: 'image/png' },
        ]
      };

      var manifestJSON = JSON.stringify(manifest);
      // 用 data URI 替代 Blob URL：Blob URL 随页面生命周期销毁，data URI 永久有效
      var manifestURL = 'data:application/json;charset=utf-8,' + encodeURIComponent(manifestJSON);

      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestURL;
      document.head.appendChild(link);
    }

    /* ====== Service Worker ======
     * 注意：单文件 HTML 无法注册持久的 Service Worker（Blob URL 的 SW 会在页面刷新后失效）。
     * 浏览器的 HTTP 缓存已足够确保离线访问本文件。
     * 如需完整离线缓存，请将此文件部署到支持自定义 Service Worker 路径的服务器。
     */

    /* ====== 全局题目数据 ====== */
    let allQuestions = [];
    let currentQuestions = [];

    /* ====== 加载题目数据 ====== */
    (function loadQuestions() {
      fetch('questions.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          allQuestions = data;
          console.log('[DS刷题] 已加载 ' + allQuestions.length + ' 道题目');
        })
        .catch(function (err) {
          console.error('[DS刷题] 题目数据加载失败:', err);
        });
    })();

    /* ====== 页面切换 ====== */
    function switchPage(fromId, toId) {
      var fromPage = document.getElementById(fromId);
      var toPage = document.getElementById(toId);
      if (!fromPage || !toPage || fromPage === toPage) return;

      // 清除目标页面残留的内联 display 样式，让 CSS class 控制布局
      toPage.style.display = '';
      fromPage.style.opacity = '1';
      toPage.style.opacity = '0';
      toPage.style.transform = 'translateY(20px)';
      toPage.style.transition = 'opacity 0.35s ease-out, transform 0.35s ease-out';
      toPage.classList.add('active');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          fromPage.style.opacity = '0';
          fromPage.style.transition = 'opacity 0.35s ease-out';

          toPage.style.opacity = '1';
          toPage.style.transform = 'translateY(0)';
        });
      });

      setTimeout(function () {
        fromPage.classList.remove('active');
      }, 400);
    }

    /* ====== 获取配置 ====== */
    function getConfig() {
      return {
        chapter: parseInt(document.getElementById('selChapter').value),
        mode: document.getElementById('selMode').value,
        count: parseInt(document.getElementById('selCount').value),
      };
    }

    /* ====== localStorage 存储键名 ====== */
    var STORAGE_KEY = 'ds_quiz_data';

    /* ====== 保存配置（防抖） ====== */
    function saveConfig() {
      clearTimeout(window._saveTimeout);
      window._saveTimeout = setTimeout(function () {
        var data = loadProgress() || {};
        data.lastConfig = getConfig();
        data.lastUpdated = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, 500);
    }

    /* ====== 读取进度 ====== */
    function loadProgress() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    /* ====== 读取统计 ====== */
    function loadStats() {
      var data = loadProgress();
      return (data && data.stats) ? data.stats : {};
    }

    /* ====== 保存统计（累加） ====== */
    function saveStats() {
      var state = window.quizState;
      if (!state) return;
      var existing = loadStats();
      for (var i = 0; i < state.results.length; i++) {
        var r = state.results[i];
        if (!existing[r.id]) existing[r.id] = { correct: 0, wrong: 0 };
        if (r.correct) existing[r.id].correct++;
        else existing[r.id].wrong++;
      }
      var data = loadProgress() || {};
      data.stats = existing;
      data.lastConfig = getConfig();
      data.lastUpdated = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    /* ====== 更新继续上次按钮 ====== */
    function updateContinueButton() {
      var data = loadProgress();
      var div = document.getElementById('lastProgress');
      var text = document.getElementById('lastProgressText');

      if (data && data.lastConfig) {
        var cfg = data.lastConfig;
        var chName = cfg.chapter === 0 ? '全部章节' : '第' + cfg.chapter + '章';
        text.textContent = '上次：' + chName + ' · ' + (cfg.mode === 'learn' ? '学习模式' : '考试模式');
        div.classList.remove('hidden');
      } else {
        div.classList.add('hidden');
      }
    }

    /* ====== Fisher-Yates 洗牌 ====== */
    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i];
        a[i] = a[j];
        a[j] = tmp;
      }
      return a;
    }

    /* ====== 按配置过滤题目 ====== */
    function filterQuestions(config) {
      var filtered = allQuestions.slice();

      // 按章节过滤（0 表示全部）
      if (config.chapter !== 0) {
        filtered = filtered.filter(function (q) { return q.chapter === config.chapter; });
      }

      return filtered;
    }

    /* ====== 开始答题 ====== */
    function startQuiz() {
      var config = getConfig();
      var pool = filterQuestions(config);

      if (pool.length === 0) {
        console.warn('[DS刷题] 当前配置下没有匹配的题目');
        var quizMain = document.getElementById('quizMain');
        if (quizMain) {
          quizMain.innerHTML = '<div class="empty-state">当前配置下没有匹配的题目，请调整筛选条件</div>';
        }
        return;
      }

      pool = shuffleArray(pool);
      if (config.count > 0 && config.count < pool.length) {
        pool = pool.slice(0, config.count);
      }

      currentQuestions = pool;

      window.quizState = {
        questions: pool,
        currentIndex: 0,
        mode: config.mode,
        answered: false,
        selectedAnswer: null,
        questionType: null,
        results: [],
        wrongIds: []
      };

      updateProgress();
      renderCurrentQuestion();
    }

    /* ====== 渲染当前题目 ====== */
    function renderCurrentQuestion() {
      var state = window.quizState;
      if (!state || state.questions.length === 0) return;

      var q = state.questions[state.currentIndex];
      var quizMain = document.getElementById('quizMain');
      if (!quizMain) return;

      var isExam = (state.mode === 'exam');
      var total = state.questions.length;
      var current = state.currentIndex + 1;
      var markHtml = isExam
        ? '<button class="btn-mark' + (q.marked ? ' marked' : '') + '" id="btnMark">' + (q.marked ? '🏴 已标记' : '🏳 标记') + '</button>'
        : '';

      // 填空题
      if (q.type === 'fill') {
        state.questionType = q.type;
        state.answered = false;
        state.selectedAnswer = null;
        quizMain.innerHTML =
          '<div class="question-card" id="questionCard">' +
            '<div class="card-header">' +
              '<span class="chapter-badge">第' + q.chapter + '章 ' + q.chapterName + '</span>' +
              '<span class="question-number">' + current + ' / ' + total + '</span>' +
              '<span class="type-badge">填空</span>' +
              markHtml +
            '</div>' +
            '<div class="question-text">' + q.question + '</div>' +
            '<div class="fill-area">' +
              '<input type="text" class="fill-input" id="fillInput" ' +
                     'placeholder="请输入答案..." autocomplete="off">' +
              '<button class="btn-submit" id="btnSubmit">确认答案</button>' +
            '</div>' +
            '<div id="cardFeedback"></div>' +
            '<div id="cardActions"></div>' +
          '</div>';
        updateProgress();
        updateExamStatus();
        return;
      }

      // 单选题
      state.questionType = q.type;
      state.answered = false;
      state.selectedAnswer = null;

      var optionsHtml = '';
      for (var i = 0; i < q.options.length; i++) {
        var letter = q.options[i].charAt(0);
        var text = q.options[i].substring(2);
        optionsHtml +=
          '<button class="option-btn" data-letter="' + letter + '">' +
            '<span class="option-letter">' + letter + '</span>' +
            '<span class="option-text">' + text + '</span>' +
          '</button>';
      }

      quizMain.innerHTML =
        '<div class="question-card" id="questionCard">' +
          '<div class="card-header">' +
            '<span class="chapter-badge">第' + q.chapter + '章 ' + q.chapterName + '</span>' +
            '<span class="question-number">' + current + ' / ' + total + '</span>' +
            '<span class="type-badge">单选</span>' +
            markHtml +
          '</div>' +
          '<div class="question-text">' + q.question + '</div>' +
          '<div class="options-list">' + optionsHtml + '</div>' +
          '<div id="cardFeedback"></div>' +
          '<div id="cardActions"></div>' +
        '</div>';
      updateExamStatus();
    }

    /* ====== 触发卡片动画 ====== */
    function triggerCardAnimation(isCorrect) {
      var card = document.getElementById('questionCard');
      if (!card) return;
      card.classList.remove('card-correct', 'card-wrong');
      void card.offsetWidth; // 强制回流，确保动画重播
      card.classList.add(isCorrect ? 'card-correct' : 'card-wrong');
      setTimeout(function () { card.classList.remove('card-correct', 'card-wrong'); }, 500);
    }

    /* ====== 处理选项点击 ====== */
    function handleChoice(btn) {
      var state = window.quizState;
      if (!state || state.answered) return;

      var letter = btn.getAttribute('data-letter');
      state.selectedAnswer = letter;
      state.answered = true;

      // 标记选中状态，添加 disabled 类
      var allBtns = document.querySelectorAll('.option-btn');
      for (var i = 0; i < allBtns.length; i++) {
        allBtns[i].classList.add('disabled');
        if (allBtns[i].getAttribute('data-letter') === letter) {
          allBtns[i].classList.add('selected');
        }
      }

      // 根据模式分支处理
      if (state.mode === 'exam') {
        handleChoiceExam(letter);
      } else {
        submitAnswer(letter);
      }
    }

    /* ====== 考试模式答题 ====== */
    function handleChoiceExam(userAnswer) {
      var state = window.quizState;
      if (!state) return;

      var q = state.questions[state.currentIndex];
      var isCorrect = (userAnswer === q.answer);

      // 记录结果
      state.results.push({
        id: q.id,
        userAnswer: userAnswer,
        correctAnswer: q.answer,
        correct: isCorrect
      });

      if (!isCorrect) {
        state.wrongIds.push(q.id);
      }

      // 考试模式：不显示对错，只显示"下一题"
      var actions = document.getElementById('cardActions');
      if (actions) {
        actions.innerHTML = '<button class="btn-next" id="btnNext">下一题 →</button>';
      }

      updateProgress();
      updateExamProgress();
    }

    /* ====== 提交答案并判题（学习模式） ====== */
    function submitAnswer(userAnswer) {
      var state = window.quizState;
      if (!state) return;

      var q = state.questions[state.currentIndex];
      var isCorrect = (userAnswer === q.answer);

      // 记录结果
      state.results.push({
        id: q.id,
        userAnswer: userAnswer,
        correctAnswer: q.answer,
        correct: isCorrect
      });

      if (!isCorrect) {
        state.wrongIds.push(q.id);
      }

      // 高亮选项
      var allBtns = document.querySelectorAll('.option-btn');
      for (var i = 0; i < allBtns.length; i++) {
        var btn = allBtns[i];
        var letter = btn.getAttribute('data-letter');
        if (letter === q.answer) {
          btn.classList.add('correct');
        }
        if (letter === userAnswer && !isCorrect) {
          btn.classList.add('wrong');
        }
      }

      // 卡片动画
      triggerCardAnimation(isCorrect);

      // 显示反馈横幅 + 解析
      showChoiceFeedback(isCorrect, userAnswer, q.answer, q.explanation);

      updateProgress();
    }

    /* ====== 学习模式选择题反馈 ====== */
    function showChoiceFeedback(isCorrect, userAnswer, correctAnswer, explanation) {
      var feedback = document.getElementById('cardFeedback');
      var actions = document.getElementById('cardActions');

      if (feedback) {
        feedback.innerHTML =
          '<div class="feedback-banner ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong') + '">' +
            '<span class="feedback-icon">' + (isCorrect ? '✅' : '❌') + '</span>' +
            '<span class="feedback-text">' + (isCorrect ? '回答正确！' : '回答错误') + '</span>' +
            (!isCorrect ? '<span class="feedback-answer">正确答案：' + correctAnswer + '</span>' : '') +
          '</div>' +
          (explanation ?
            '<div class="explanation-box">' +
              '<div class="explanation-header">📖 解析</div>' +
              '<div class="explanation-content">' + explanation + '</div>' +
            '</div>' : '');
      }

      if (actions) {
        actions.innerHTML = '<button class="btn-next" id="btnNext">下一题 →</button>';
      }
    }

    /* ====== 填空题答案模糊匹配 ====== */
    function matchFillAnswer(userInput, correctAnswer) {
      var input = userInput.trim().replace(/\s+/g, ' ').toLowerCase();
      var answers = correctAnswer.split('|').map(function (a) {
        return a.trim().replace(/\s+/g, ' ').toLowerCase();
      });
      return answers.includes(input);
    }

    /* ====== 填空题提交 ====== */
    function submitFillAnswer() {
      var state = window.quizState;
      if (!state || state.answered) return;

      var input = document.getElementById('fillInput');
      if (!input) return;

      var userAnswer = input.value.trim();
      if (!userAnswer) {
        input.style.borderColor = 'var(--error)';
        input.placeholder = '请先输入答案！';
        return;
      }

      var q = state.questions[state.currentIndex];
      var isCorrect = matchFillAnswer(userAnswer, q.answer);

      state.answered = true;
      state.selectedAnswer = userAnswer;
      state.results.push({
        id: q.id,
        userAnswer: userAnswer,
        correct: isCorrect,
      });

      if (!isCorrect) state.wrongIds.push(q.id);

      // 禁用输入
      input.disabled = true;
      var btnSubmit = document.getElementById('btnSubmit');
      if (btnSubmit) btnSubmit.disabled = true;

      // 根据模式分支
      if (state.mode === 'exam') {
        // 考试模式：只显示下一题
        var actions = document.getElementById('cardActions');
        if (actions) {
          actions.innerHTML = '<button class="btn-next" id="btnNext">下一题 →</button>';
          }
        updateExamProgress();
      } else {
        // 学习模式：显示反馈
        showFillFeedback(isCorrect, q.answer, q.explanation);
      }

      updateProgress();
    }

    /* ====== 学习模式填空题反馈 ====== */
    function showFillFeedback(isCorrect, correctAnswer, explanation) {
      var feedback = document.getElementById('cardFeedback');
      var actions = document.getElementById('cardActions');

      if (feedback) {
        feedback.innerHTML =
          '<div class="feedback-banner ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong') + '">' +
            '<span class="feedback-icon">' + (isCorrect ? '✅' : '❌') + '</span>' +
            '<span class="feedback-text">' + (isCorrect ? '回答正确！' : '回答错误') + '</span>' +
            (!isCorrect ? '<span class="feedback-answer">正确答案：' + correctAnswer + '</span>' : '') +
          '</div>' +
          (explanation ?
            '<div class="explanation-box">' +
              '<div class="explanation-header">📖 解析</div>' +
              '<div class="explanation-content">' + explanation + '</div>' +
            '</div>' : '');
      }

      if (actions) {
        actions.innerHTML = '<button class="btn-next" id="btnNext">下一题 →</button>';
      }
    }

    /* ====== 下一题 ====== */
    function nextQuestion() {
      var state = window.quizState;
      if (!state) return;

      // 检查当前题目是否已提交（填空题可能被跳过）
      var q = state.questions[state.currentIndex];
      var alreadySubmitted = false;
      for (var i = 0; i < state.results.length; i++) {
        if (state.results[i].id === q.id) {
          alreadySubmitted = true;
          break;
        }
      }
      if (!alreadySubmitted) {
        // 未提交的题目（如填空题）：记录为跳过/未答
        var isCorrect = q.type === 'fill'
          ? false
          : (state.selectedAnswer === q.answer);
        state.results.push({
          id: q.id,
          userAnswer: state.selectedAnswer || null,
          correctAnswer: q.answer,
          correct: isCorrect
        });
        if (!isCorrect) {
          state.wrongIds.push(q.id);
        }
      }

      if (state.currentIndex + 1 < state.questions.length) {
        state.currentIndex++;
        state.answered = false;
        state.selectedAnswer = null;
        updateProgress();
        renderCurrentQuestion();
      } else {
        showResult();
      }
    }

    /* ====== 更新进度条 ====== */
    function updateProgress() {
      var state = window.quizState;
      if (!state) return;

      var total = state.questions.length;
      var answered = state.results.length;

      var progressText = document.getElementById('progressText');
      var progressFill = document.getElementById('progressFill');
      var correctRate = document.getElementById('correctRate');

      if (progressText) {
        progressText.textContent = answered + ' / ' + total;
      }

      if (progressFill && total > 0) {
        var pct = Math.round((answered / total) * 100);
        progressFill.style.width = pct + '%';
      }

      if (correctRate) {
        if (answered > 0) {
          var correctCount = 0;
          for (var i = 0; i < state.results.length; i++) {
            if (state.results[i].correct) correctCount++;
          }
          var rate = Math.round((correctCount / answered) * 100);
          correctRate.textContent = '正确率 ' + rate + '%';
        } else {
          correctRate.textContent = '正确率 --';
        }
      }

      // 考试模式：更新考试状态栏
      updateExamProgress();
    }

    /* ====== 重置答题状态 ====== */
    function resetQuizState() {
      window.quizState = null;
    }

    /* ====== 渲染章节得分 ====== */
    function renderChapterScores() {
      var state = window.quizState;
      if (!state) return;
      var byChapter = {};
      for (var i = 0; i < state.results.length; i++) {
        var r = state.results[i];
        var q = null;
        for (var k = 0; k < allQuestions.length; k++) {
          if (allQuestions[k].id === r.id) { q = allQuestions[k]; break; }
        }
        if (!q) continue;
        if (!byChapter[q.chapter]) byChapter[q.chapter] = { total: 0, correct: 0, name: q.chapterName };
        byChapter[q.chapter].total++;
        if (r.correct) byChapter[q.chapter].correct++;
      }

      var chapters = [];
      for (var ch in byChapter) {
        if (byChapter.hasOwnProperty(ch)) chapters.push(ch);
      }
      chapters.sort();
      var html = '';
      for (var ci = 0; ci < chapters.length; ci++) {
        var ch = chapters[ci];
        var data = byChapter[ch];
        var pct = Math.round((data.correct / data.total) * 100);
        html += '<div class="chapter-score-row">' +
          '<span class="chapter-score-name">' + data.name + '</span>' +
          '<div class="chapter-score-bar">' +
            '<div class="chapter-score-fill" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<span class="chapter-score-pct">' + pct + '%</span>' +
        '</div>';
      }

      document.getElementById('chapterScores').innerHTML = html;
    }

    /* ====== 渲染错题回顾 ====== */
    function renderWrongReview() {
      var state = window.quizState;
      if (!state) return;
      var wrongResults = [];
      for (var i = 0; i < state.results.length; i++) {
        if (!state.results[i].correct) wrongResults.push(state.results[i]);
      }

      if (wrongResults.length === 0) {
        document.getElementById('wrongReview').innerHTML =
          '<div class="wrong-title">🎯 全部正确，太棒了！</div>';
        return;
      }

      var items = '';
      for (var j = 0; j < wrongResults.length; j++) {
        var r = wrongResults[j];
        var q = null;
        for (var k = 0; k < allQuestions.length; k++) {
          if (allQuestions[k].id === r.id) { q = allQuestions[k]; break; }
        }
        if (!q) continue;
        items += '<div class="wrong-item">' +
          '<div class="question-text">' + q.question + '</div>' +
          '<div class="wrong-detail">' +
            '你的答案：<span>' + (r.userAnswer || '未作答') + '</span> &nbsp;' +
            '正确答案：<span class="correct-ans">' + q.answer + '</span>' +
          '</div>' +
        '</div>';
      }

      document.getElementById('wrongReview').innerHTML =
        '<div class="wrong-title">📋 错题回顾 (' + wrongResults.length + ')</div>' +
        items;
    }

    /* ====== 显示结算页 ====== */
    function showResult() {
      var state = window.quizState;
      if (!state) return;

      var total = state.results.length;
      var correct = 0;
      for (var i = 0; i < state.results.length; i++) {
        if (state.results[i].correct) correct++;
      }
      var pct = total > 0 ? Math.round((correct / total) * 100) : 0;

      // 圆环图表
      var ring = document.getElementById('ringProgress');
      if (ring) {
        var circumference = 2 * Math.PI * 70;
        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
      }
      var ringPct = document.getElementById('ringPercent');
      if (ringPct) ringPct.textContent = pct + '%';

      // 章节得分和错题回顾
      renderChapterScores();
      renderWrongReview();

      // 保存统计到 localStorage
      saveStats();

      switchPage('quiz', 'result');
    }

    /* ====== 题目标记功能 ====== */
    function toggleMark() {
      var state = window.quizState;
      if (!state) return;
      var q = state.questions[state.currentIndex];
      q.marked = !q.marked;
      updateMarkButton();
      updateExamProgress();
    }

    function updateMarkButton() {
      var state = window.quizState;
      if (!state) return;
      var q = state.questions[state.currentIndex];
      var btn = document.getElementById('btnMark');
      if (btn) {
        btn.textContent = q.marked ? '🏴 已标记' : '🏳 标记';
        if (q.marked) {
          btn.classList.add('marked');
        } else {
          btn.classList.remove('marked');
        }
      }
    }

    /* ====== 考试进度更新 ====== */
    function updateExamProgress() {
      var state = window.quizState;
      if (!state) return;

      var total = state.questions.length;
      var answered = state.results.length;
      var unanswered = total - answered;
      var marked = 0;
      for (var i = 0; i < state.questions.length; i++) {
        if (state.questions[i].marked) marked++;
      }

      var answeredEl = document.getElementById('examAnswered');
      var unansweredEl = document.getElementById('examUnanswered');
      var markedEl = document.getElementById('examMarked');
      if (answeredEl) answeredEl.textContent = answered;
      if (unansweredEl) unansweredEl.textContent = unanswered;
      if (markedEl) markedEl.textContent = marked;
    }

    /* ====== 考试状态栏显隐 ====== */
    function updateExamStatus() {
      var state = window.quizState;
      var examStatus = document.getElementById('examStatus');
      if (!examStatus) return;
      if (state && state.mode === 'exam') {
        examStatus.classList.remove('hidden');
      } else {
        examStatus.classList.add('hidden');
      }
      updateExamProgress();
    }

    /* ====== 交卷 ====== */
    function finishExam() {
      var state = window.quizState;
      if (!state) return;

      // 未答题目标记为错误
      var submittedIds = {};
      for (var i = 0; i < state.results.length; i++) {
        submittedIds[state.results[i].id] = true;
      }
      for (var j = 0; j < state.questions.length; j++) {
        var q = state.questions[j];
        if (!submittedIds[q.id]) {
          state.results.push({
            id: q.id,
            userAnswer: null,
            correct: false
          });
          state.wrongIds.push(q.id);
        }
      }

      showResult();
    }

    /* ====== 选择器变更处理 ====== */
    function onConfigChange() {
      var config = getConfig();
      saveConfig();

      // 预览匹配题目数量
      var filtered = filterQuestions(config);
      var info = '共 ' + filtered.length + ' 题';
      if (config.count !== 0) {
        var count = Math.min(config.count, filtered.length);
        info = '随机 ' + count + ' / ' + filtered.length + ' 题';
      }
      console.log('[DS刷题] 配置变更:', config, info);

      startQuiz();
    }

    /* ====== 页面初始化（合并所有 DOMContentLoaded 逻辑） ====== */
    document.addEventListener('DOMContentLoaded', function () {
      drawTreeIcon();
      setupIcons();
      setupManifest();
      // SW 已移除：Blob URL 的 SW 在浏览器重开后会失效，反而可能导致 PWA 身份不稳定

      // ====== 开始按钮 ======
      var btnStart = document.getElementById('btnStart');
      if (btnStart) {
        btnStart.addEventListener('click', function () {
          switchPage('cover', 'quiz');
          startQuiz();
        });
      }

      // ====== 继续上次按钮 ======
      var btnContinue = document.getElementById('btnContinue');
      if (btnContinue) {
        btnContinue.addEventListener('click', function () {
          var data = loadProgress();
          if (data && data.lastConfig) {
            var cfg = data.lastConfig;
            var selChapter = document.getElementById('selChapter');
            var selMode = document.getElementById('selMode');
            var selCount = document.getElementById('selCount');
            if (selChapter) selChapter.value = cfg.chapter;
            if (selMode) selMode.value = cfg.mode;
            if (selCount) selCount.value = cfg.count;
          }
          switchPage('cover', 'quiz');
          startQuiz();
        });
      }

      // ====== 返回按钮 ======
      var btnBack = document.getElementById('btnBack');
      if (btnBack) {
        btnBack.addEventListener('click', function () {
          if (confirm('确定要返回封面吗？当前进度将丢失。')) {
            switchPage('quiz', 'cover');
          }
        });
      }

      // ====== 恢复上次配置并更新继续按钮 ======
      var selChapter = document.getElementById('selChapter');
      var selMode = document.getElementById('selMode');
      var selCount = document.getElementById('selCount');
      var savedData = loadProgress();
      if (savedData && savedData.lastConfig) {
        var cfg = savedData.lastConfig;
        if (selChapter) selChapter.value = cfg.chapter;
        if (selMode) selMode.value = cfg.mode;
        if (selCount) selCount.value = cfg.count;
      }

      updateContinueButton();

      // ====== 选择器变更事件 ======
      if (selChapter) selChapter.addEventListener('change', onConfigChange);
      if (selMode) selMode.addEventListener('change', onConfigChange);
      if (selCount) selCount.addEventListener('change', onConfigChange);

      // ====== 答题区事件委托 ======
      var quizMainEl = document.getElementById('quizMain');
      if (quizMainEl) {
        quizMainEl.addEventListener('click', function (e) {
          // 填空题提交按钮
          if (e.target.id === 'btnSubmit') {
            submitFillAnswer();
            return;
          }
          // 标记按钮
          if (e.target.id === 'btnMark' || e.target.closest('#btnMark')) {
            toggleMark();
            return;
          }
          // 选项按钮
          var optionBtn = e.target.closest('.option-btn');
          if (optionBtn) {
            var state = window.quizState;
            if (state && !state.answered) {
              handleChoice(optionBtn);
            }
            return;
          }
          // 下一题按钮（.btn-next 和 .next-btn 都支持）
          var nextBtn = e.target.closest('.btn-next') || e.target.closest('.next-btn');
          if (nextBtn) {
            nextQuestion();
            return;
          }
        });
      }

      // ====== 考试交卷按钮 ======
      var btnSubmitExam = document.getElementById('btnSubmitExam');
      if (btnSubmitExam) {
        btnSubmitExam.addEventListener('click', function () {
          var state = window.quizState;
          if (!state) return;
          var total = state.questions.length;
          var answered = state.results.length;
          var unanswered = total - answered;
          var msg = '确定要交卷吗？';
          if (unanswered > 0) {
            msg += '\n还有 ' + unanswered + ' 题未作答！';
          }
          if (confirm(msg)) {
            finishExam();
          }
        });
      }

      // ====== 键盘快捷键 ======
      document.addEventListener('keydown', function (e) {
        var state = window.quizState;
        if (!state) return;

        var quizPage = document.getElementById('quiz');
        if (!quizPage || !quizPage.classList.contains('active')) return;

        // 填空题 Enter 提交
        if (e.key === 'Enter' && state.questionType === 'fill' && !state.answered) {
          e.preventDefault();
          submitFillAnswer();
          return;
        }

        var key = e.key.toUpperCase();

        // 未作答：A/B/C/D 或 1-4 选择选项
        if (!state.answered) {
          var letterMap = { 'A': 'A', 'B': 'B', 'C': 'C', 'D': 'D', '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
          var mapped = letterMap[key];
          if (mapped) {
            var btn = quizMainEl.querySelector('.option-btn[data-letter="' + mapped + '"]');
            if (btn) {
              e.preventDefault();
              handleChoice(btn);
            }
          }
        } else {
          // 已作答：Enter / ArrowRight / Space 进入下一题
          if (key === 'ENTER' || key === 'ARROWRIGHT' || key === ' ') {
            e.preventDefault();
            nextQuestion();
          }
        }
      });

      // ====== 结算页：重刷错题按钮 ======
      var btnRetryWrong = document.getElementById('btnRetryWrong');
      if (btnRetryWrong) {
        btnRetryWrong.addEventListener('click', function () {
          var state = window.quizState;
          if (!state) return;
          var wrongIds = [];
          for (var i = 0; i < state.results.length; i++) {
            if (!state.results[i].correct) wrongIds.push(state.results[i].id);
          }
          if (wrongIds.length === 0) {
            alert('没有错题！');
            return;
          }
          var pool = [];
          for (var j = 0; j < allQuestions.length; j++) {
            if (wrongIds.indexOf(allQuestions[j].id) !== -1) {
              pool.push(allQuestions[j]);
            }
          }
          if (pool.length === 0) {
            alert('题库中未找到错题对应的题目！');
            return;
          }
          pool = shuffleArray(pool);
          window.quizState = {
            questions: pool,
            currentIndex: 0,
            mode: 'learn',
            answered: false,
            selectedAnswer: null,
            questionType: null,
            results: [],
            wrongIds: []
          };
          switchPage('result', 'quiz');
          updateProgress();
          updateExamStatus();
          renderCurrentQuestion();
        });
      }

      // ====== 结算页：重新开始按钮 ======
      var btnRestart = document.getElementById('btnRestart');
      if (btnRestart) {
        btnRestart.addEventListener('click', function () {
          resetQuizState();
          switchPage('result', 'cover');
          updateContinueButton();
        });
      }
    });
  </script>
